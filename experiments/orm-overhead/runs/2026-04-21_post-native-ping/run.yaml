run_id: "2026-04-21_post-native-ping"
date: "2026-04-21T00:00:00Z"
label: "post-native-ping"
role: candidate
compares_to: "2026-03-28_post-sa-optimization"
comparable_group: "devbox-i5-4200M-linux5.15-docker-cubrid112"

environment:
  host:
    hostname: "devbox"
    cpu: "Intel(R) Core(TM) i5-4200M CPU @ 2.50GHz"
    cores: 4
    memory_gb: 15.3
    os: "Linux"
    kernel: "5.15.0-176-generic"
  software:
    python: "CPython 3.10.12"
    cubrid_server: "11.2.9.0866"
    docker: "29.3.1"
  drivers:
    pycubrid: "1.3.2"
    sqlalchemy_cubrid: "1.4.2"
    sqlalchemy: "2.0.49"
  database:
    name: testdb
    host: localhost
    port: 33000
    autocommit: false
    container: pycubrid-cubrid-1

protocol:
  duration_s: 10
  warmup_s: 2
  seed: 42
  seed_rows: 1000
  batch_size: 100
  concurrency: 1
  dsn: "cubrid+pycubrid://dba@localhost:33000/testdb"
  setup_queries: []
  teardown_queries: []

artifacts:
  raw_dir: raw/
  derived_dir: derived/
  figures_dir: figures/

notes: >
  Updated-baseline rerun on the current stack (pycubrid 1.3.2,
  sqlalchemy-cubrid 1.4.2, SQLAlchemy 2.0.49). WorkerInput matched the
  2026-03-28_post-sa-optimization candidate exactly (duration=10s,
  warmup=2s, seed=42, seed_rows=1000, batch_size=100, concurrency=1,
  setup/teardown empty); only package versions changed.

  IMPORTANT — this run is NOT a causal test of the native CHECK_CAS ping
  change shipped in pycubrid 1.3.2 / sqla 1.4.2. The workers use a single
  long-lived connection and do not enable pool_pre_ping, so the ping()
  hot path is never exercised here. The 03-28 → 04-21 delta also spans
  multiple stack changes (pycubrid 0.6.0 → 1.3.2,
  sqlalchemy-cubrid 0.7.1 → 1.4.2, SQLAlchemy 2.0.48 → 2.0.49) and a
  single trial; the host kernel also drifted (5.15.0-173 → 5.15.0-176).
  Treat the deltas as an updated baseline only. The Core insert_batch
  +123% outlier is most likely attributable to use_insertmanyvalues being
  enabled in the dialect (separate change), not to ping. Follow-up
  isolation runs (3–5 trials with bands; pycubrid 1.3.1 vs 1.3.2 raw-only;
  sqla 1.4.1 vs 1.4.2 with pycubrid pinned) are required before any
  causal claim. No new figures were generated for this rerun; see
  derived/summary.* for the before/after comparison artifacts.
