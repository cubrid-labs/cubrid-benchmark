run_id: "2026-04-22_native-ping-hotpath"
date: "2026-04-22T00:00:00Z"
label: "native-ping-hotpath"
role: candidate
compares_to: "2026-04-22_multitrial-baseline"
comparable_group: "devbox-i5-4200M-linux5.15-docker-cubrid112"

environment:
  host:
    hostname: "devbox"
    cpu: "Intel(R) Core(TM) i5-4200M CPU @ 2.50GHz"
    cores: 4
    memory_gb: 15.3
    os: "Linux"
    kernel: "5.15.0-176-generic"
  software:
    python: "CPython 3.10.12"
    cubrid_server: "11.2.9.0866"
    docker: "29.3.1"
  drivers:
    pycubrid: "1.3.2"
    sqlalchemy_cubrid: "1.4.2"
    sqlalchemy: "2.0.48"
  database:
    name: testdb
    host: localhost
    port: 33000
    autocommit: false
    container: pycubrid-cubrid-1

protocol:
  duration_s: 30
  warmup_s: 5
  seed: 42
  seed_rows: 1000
  concurrency: 1
  trials: 7
  pool_pre_ping: true
  pool_size: 1
  max_overflow: 0
  arms: [native, select1]
  arm_order: randomized_per_trial
  trial_order:
    trial1: [select1, native]
    trial2: [select1, native]
    trial3: [native, select1]
    trial4: [select1, native]
    trial5: [select1, native]
    trial6: [select1, native]
    trial7: [select1, native]
  dsn: "cubrid+pycubrid://dba@localhost:33000/testdb"
  setup_queries: []
  teardown_queries: []

artifacts:
  raw_dir: raw/
  derived_dir: derived/

notes: >
  Oracle causal design benchmark: paired same-version A/B on the same
  installed pycubrid 1.3.2 + sqlalchemy-cubrid 1.4.2 + SQLAlchemy 2.0.48
  stack, switching only the ping path between native CHECK_CAS
  (`native`) and forced `SELECT 1` (`select1`). Raw worker uses the same
  persistent pycubrid connection in both arms; SQLAlchemy Core/ORM workers
  keep identical engine settings with pool_pre_ping=true, pool_size=1,
  max_overflow=0, and short-lived checkout/session loops, while the
  `select1` arm monkey-patches only `engine.dialect.do_ping` to the old
  cursor-based `SELECT 1` path. Trial arm order is randomized per trial
  with seed=42 and recorded above; trial order was randomized but not
  counterbalanced — `select1` ran first in 6 of 7 trials, so residual
  order effects remain possible. This is the causal native-ping hot-path
  test requested by Oracle; any claimed win must be supported by the paired
  bootstrap deltas rather than cross-run comparisons.
