run_id: "2026-04-22_multitrial-baseline"
date: "2026-04-22T00:00:00Z"
label: "multitrial-baseline"
role: candidate
compares_to: "2026-04-21_post-native-ping"
comparable_group: "devbox-i5-4200M-linux5.15-docker-cubrid112"

environment:
  host:
    hostname: "devbox"
    cpu: "Intel(R) Core(TM) i5-4200M CPU @ 2.50GHz"
    cores: 4
    memory_gb: 15.3
    os: "Linux"
    kernel: "5.15.0-176-generic"
  software:
    python: "CPython 3.10.12"
    cubrid_server: "11.2.9.0866"
    docker: "29.3.1"
  drivers:
    pycubrid: "1.3.2"
    sqlalchemy_cubrid: "1.4.2"
    sqlalchemy: "2.0.48"
  database:
    name: testdb
    host: localhost
    port: 33000
    autocommit: false
    container: pycubrid-cubrid-1

protocol:
  duration_s: 10
  warmup_s: 2
  seed: 42
  seed_rows: 1000
  batch_size: 100
  concurrency: 1
  trials: 5
  dsn: "cubrid+pycubrid://dba@localhost:33000/testdb"
  setup_queries: []
  teardown_queries: []

artifacts:
  raw_dir: raw/
  derived_dir: derived/
  figures_dir: figures/

notes: >
  Five-trial repeat of the exact same WorkerInput used by
  2026-04-21_post-native-ping (duration=10s, warmup=2s, seed=42,
  seed_rows=1000, batch_size=100, concurrency=1, setup/teardown empty)
  to provide trial-to-trial noise bands. This run is still NOT a ping
  causal test: the workers use a single long-lived connection without
  pool_pre_ping, so the ping() path is not exercised in the hot loop.
  Aggregation reports median, mean, [min..max], and IQR from the five
  trial-level throughput_ops_s and p95_ns observations, plus individual
  trial values for transparency. Comparison vs 2026-04-21 flags any
  single-trial value that falls outside the five-trial band as noise-
  driven or otherwise unrepresentative. Runtime verification found
  SQLAlchemy 2.0.48 installed on this host, so this rerun preserves the
  04-21 WorkerInput exactly but not the 04-21 metadata claim of 2.0.49.
  No figures were generated for this run.
