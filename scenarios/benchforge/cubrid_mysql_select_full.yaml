name: cubrid-mysql-select-full-scan
description: 'Full table scan on a 1K-row table. Measures sequential read throughput for CUBRID (pycubrid) vs MySQL (PyMySQL). Replicates cubrid-benchmark Tier 1: bench_select_10k_full_scan.'
