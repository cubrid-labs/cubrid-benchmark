name: driver-compare-select-pk
description: >
  Point SELECT by primary key — pycubrid (Pure Python) vs CUBRIDdb (C extension).
  Same CUBRID 11.2 server, same CAS protocol, isolates driver implementation.

setup:
  queries:
    - "DROP TABLE IF EXISTS bench_select"
    - >
      CREATE TABLE bench_select (
        id INT PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        amount INT NOT NULL
      )
    - |
      INSERT INTO bench_select
      SELECT ROWNUM, 'user_' || CAST(ROWNUM AS VARCHAR), MOD(ROWNUM, 10000)
      FROM db_class
      LIMIT 10000

teardown:
  queries:
    - "DROP TABLE IF EXISTS bench_select"

steps:
  - name: select-by-pk
    query: "SELECT id, name, amount FROM bench_select WHERE id = %(id)s"
    params:
      id: "random_int(1, 10000)"

load:
  concurrency: 1
  duration: 30
  warmup:
    duration: 3

experiment:
  iterations: 5
  seed: 42
  pause_between: 2.0

targets:
  - name: pycubrid
    stack_id: python+pycubrid
    language: python
    driver: pycubrid
    dsn: "cubrid://dba:@localhost:33000/benchdb"

  - name: cubriddb
    stack_id: python+cubriddb
    language: python
    driver: CUBRIDdb
    dsn: "cubrid://dba:@localhost:33000/benchdb"
