name: cubrid-vs-mysql-point-select
description: >
  Point SELECT benchmark — CUBRID vs MySQL across Python, Go, and TypeScript.
  Uses bench_users table with pre-seeded 100 rows.
  Each operation is a single SELECT by primary key with random id.

# NOTE: setup/teardown are skipped — use the existing seeded bench_users table.
# Run `make seed` before benchmarking to ensure data is ready.

steps:
  - name: select-by-pk
    query: "SELECT id, name, email, age, created_at FROM bench_users WHERE id = %(id)s"
    params:
      id: "random_int(1, 100)"

load:
  concurrency: 4
  duration: 15
  warmup:
    duration: 3

experiment:
  iterations: 5
  seed: 42
  pause_between: 2.0

targets:
  # --- Python (in-process workers) ---
  - name: pycubrid
    stack_id: python+pycubrid
    language: python
    driver: pycubrid
    dsn: "cubrid://dba:@localhost:33000/benchdb"

  - name: pymysql
    stack_id: python+pymysql
    language: python
    driver: pymysql
    dsn: "mysql://root:bench@localhost:3306/benchdb"

  # --- Go (external subprocess worker) ---
  - name: go-cubrid
    stack_id: go+cubrid-go
    language: go
    driver: cubrid-go
    dsn: "cubrid://dba:@localhost:33000/benchdb"
    worker_config:
      command: ["go", "run", "./go/cmd/benchflow_worker"]

  - name: go-mysql
    stack_id: go+mysql
    language: go
    driver: go-sql-driver/mysql
    dsn: "mysql://root:bench@localhost:3306/benchdb"
    worker_config:
      command: ["go", "run", "./go/cmd/benchflow_worker"]

  # --- TypeScript (external subprocess worker) ---
  - name: ts-cubrid
    stack_id: ts+cubrid-client
    language: typescript
    driver: cubrid-client
    dsn: "cubrid://dba:@localhost:33000/benchdb"
    worker_config:
      command: ["npx", "tsx", "./typescript/benchflow_worker.ts"]

  - name: ts-mysql
    stack_id: ts+mysql2
    language: typescript
    driver: mysql2
    dsn: "mysql://root:bench@localhost:3306/benchdb"
    worker_config:
      command: ["npx", "tsx", "./typescript/benchflow_worker.ts"]
