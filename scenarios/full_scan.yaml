name: cubrid-vs-mysql-full-scan
description: >
  Full table scan benchmark — CUBRID vs MySQL across Python, Go, and TypeScript.
  Scans the entire bench_users table (100 rows) in each operation.

# NOTE: uses the existing seeded bench_users table.
# Run `make seed` before benchmarking.

steps:
  - name: select-full-scan
    query: "SELECT id, name, email, age, created_at FROM bench_users"

load:
  concurrency: 1
  duration: 15
  warmup:
    duration: 3

experiment:
  iterations: 5
  seed: 42
  pause_between: 2.0

targets:
  # --- Python ---
  - name: pycubrid
    stack_id: python+pycubrid
    language: python
    driver: pycubrid
    dsn: "cubrid://dba:@localhost:33000/benchdb"

  - name: pymysql
    stack_id: python+pymysql
    language: python
    driver: pymysql
    dsn: "mysql://root:bench@localhost:3306/benchdb"

  # --- Go ---
  - name: go-cubrid
    stack_id: go+cubrid-go
    language: go
    driver: cubrid-go
    dsn: "cubrid://dba:@localhost:33000/benchdb"
    worker_config:
      command: ["go", "run", "./go/cmd/benchflow_worker"]

  - name: go-mysql
    stack_id: go+mysql
    language: go
    driver: go-sql-driver/mysql
    dsn: "mysql://root:bench@localhost:3306/benchdb"
    worker_config:
      command: ["go", "run", "./go/cmd/benchflow_worker"]

  # --- TypeScript ---
  - name: ts-cubrid
    stack_id: ts+cubrid-client
    language: typescript
    driver: cubrid-client
    dsn: "cubrid://dba:@localhost:33000/benchdb"
    worker_config:
      command: ["npx", "tsx", "./typescript/benchflow_worker.ts"]

  - name: ts-mysql
    stack_id: ts+mysql2
    language: typescript
    driver: mysql2
    dsn: "mysql://root:bench@localhost:3306/benchdb"
    worker_config:
      command: ["npx", "tsx", "./typescript/benchflow_worker.ts"]
