name: cubrid-vs-mysql-connection-lifecycle
description: >
  Connection lifecycle benchmark — measures SELECT 1 (ping) latency as a proxy
  for connection health and minimal query round-trip time.
  NOTE: True connect/disconnect-per-operation benchmarking requires worker
  protocol changes (see benchforge#8). This scenario measures minimal query
  latency over a persistent connection instead.

steps:
  - name: ping-select-1
    query: "SELECT 1"

load:
  concurrency: 1
  duration: 15
  warmup:
    duration: 3

experiment:
  iterations: 3
  seed: 42
  pause_between: 2.0

targets:
  # --- Python ---
  - name: pycubrid
    stack_id: python+pycubrid
    language: python
    driver: pycubrid
    dsn: "cubrid://dba:@localhost:33000/benchdb"

  - name: pymysql
    stack_id: python+pymysql
    language: python
    driver: pymysql
    dsn: "mysql://root:bench@localhost:3306/benchdb"

  # --- Go ---
  - name: go-cubrid
    stack_id: go+cubrid-go
    language: go
    driver: cubrid-go
    dsn: "cubrid://dba:@localhost:33000/benchdb"
    worker_config:
      command: ["./bin/benchflow_worker_go"]

  - name: go-mysql
    stack_id: go+mysql
    language: go
    driver: go-sql-driver/mysql
    dsn: "mysql://root:bench@localhost:3306/benchdb"
    worker_config:
      command: ["./bin/benchflow_worker_go"]

  # --- TypeScript ---
  - name: ts-cubrid
    stack_id: ts+cubrid-client
    language: typescript
    driver: cubrid-client
    dsn: "cubrid://dba:@localhost:33000/benchdb"
    worker_config:
      command: ["./typescript/node_modules/.bin/tsx", "./typescript/benchflow_worker.ts"]

  - name: ts-mysql
    stack_id: ts+mysql2
    language: typescript
    driver: mysql2
    dsn: "mysql://root:bench@localhost:3306/benchdb"
    worker_config:
      command: ["./typescript/node_modules/.bin/tsx", "./typescript/benchflow_worker.ts"]
