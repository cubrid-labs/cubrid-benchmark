name: mysql-orm-crud
description: >
  SQLAlchemy ORM CRUD scenario for MySQL via PyMySQL.
  Covers single-row ORM CRUD and query-builder versus raw SQL comparison on bench_users.

setup:
  queries:
    - "DELETE FROM bench_users"

teardown:
  queries:
    - "DELETE FROM bench_users"

steps:
  - name: orm-single-row-crud
    worker: python/bench_sqlalchemy_mysql.py::test_bench_single_row_crud

  - name: orm-query-builder-select-all
    worker: python/bench_sqlalchemy_mysql.py::test_bench_query_builder_select_all

  - name: raw-sql-select-all
    worker: python/bench_sqlalchemy_mysql.py::test_bench_raw_sql_select_all

targets:
  - name: sqlalchemy-mysql
    stack_id: python+sqlalchemy-pymysql
    language: python
    driver: pymysql
    dsn: "mysql+pymysql://root:bench@localhost:3306/benchdb"
