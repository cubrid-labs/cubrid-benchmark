name: Benchmark

on:
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  tier0-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    services:
      cubrid:
        image: cubrid/cubrid:11.2
        env:
          CUBRID_DB: benchdb
        ports:
          - 33000:33000
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/127.0.0.1/33000'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: bench
          MYSQL_DATABASE: benchdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h127.0.0.1 -uroot -pbench --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt

      - name: Install TypeScript dependencies
        run: cd typescript && npm ci

      - name: Wait for databases
        run: ./scripts/wait_for_db.sh

      - name: Apply schema and seed data
        run: make seed

      - name: Run Python Tier 0
        run: make tier0

      - name: Run TypeScript Tier 0
        run: make tier0-ts

      - name: Run Go Tier 0
        run: make tier0-go

  nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      issues: write
    services:
      cubrid:
        image: cubrid/cubrid:11.2
        env:
          CUBRID_DB: benchdb
        ports:
          - 33000:33000
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/127.0.0.1/33000'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: bench
          MYSQL_DATABASE: benchdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h127.0.0.1 -uroot -pbench --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75.0"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt

      - name: Install TypeScript dependencies
        run: cd typescript && npm ci

      - name: Wait for databases
        run: ./scripts/wait_for_db.sh

      - name: Apply schema and seed data
        run: make seed

      - name: Run Python Tier 0
        run: make tier0

      - name: Run TypeScript Tier 0
        run: make tier0-ts

      - name: Run Go Tier 0
        run: make tier0-go

      - name: Run Python Tier 1
        run: make tier1-python

      - name: Run Python Tier 1 Extended
        run: make tier1-python-extended

      - name: Run Python Tier 2
        run: make tier2-python

      - name: Run TypeScript Tier 1
        run: make tier1-ts

      - name: Run TypeScript Tier 1 Extended
        run: make tier1-ts-extended

      - name: Run Go Tier 1
        run: make tier1-go

      - name: Run Go Tier 1 Extended
        run: make tier1-go-extended

      - name: Run Rust Tier 0
        run: make tier0-rust

      - name: Run Rust Tier 1
        run: make tier1-rust

      - name: Normalize benchmark result
        run: |
          python3 scripts/normalize_results.py results/python_tier1.json > results/normalized_python_tier1.json
          python3 scripts/normalize_results.py results/python_tier1_extended.json > results/normalized_python_tier1_extended.json


      - name: Emit benchforge v2 results
        run: |
          python3 scripts/emit_benchforge_v2.py 
            --input results/python_tier1.json 
            --output results/benchforge_v2/python_tier1.json 
            --suite-name python-tier1 
            --tier tier1 
            --language python 
            --driver mixed 
            --database mixed
          python3 scripts/emit_benchforge_v2.py 
            --input results/python_tier1_extended.json 
            --output results/benchforge_v2/python_tier1_extended.json 
            --suite-name python-tier1-extended 
            --tier tier1-extended 
            --language python 
            --driver mixed 
            --database mixed
          python3 scripts/emit_benchforge_v2.py 
            --input results/tier2_python.json 
            --output results/benchforge_v2/python_tier2.json 
            --suite-name python-tier2 
            --tier tier2 
            --language python 
            --driver mixed 
            --database mixed

      - name: Compare nightly run against latest baseline
        id: compare_regression
        run: |
          baseline_dir="$(python3 - <<'PY'
          from pathlib import Path
          import sys

          experiment_dir = Path("experiments/baseline-multilang")
          baseline_runs = []
          for run_yaml in experiment_dir.glob("runs/*/run.yaml"):
              role = None
              for line in run_yaml.read_text(encoding="utf-8").splitlines():
                  if line.startswith("role:"):
                      role = line.split(":", 1)[1].strip().split("#", 1)[0].strip().strip('"')
                      break
              if role == "baseline":
                  baseline_runs.append(run_yaml.parent)

          if not baseline_runs:
              raise SystemExit("No baseline run found in experiments/baseline-multilang")

          baseline_runs.sort()
          sys.stdout.write(str(baseline_runs[-1]))
          PY
          )"
          candidate_dir="$(mktemp -d)"
          python3 - "$baseline_dir" "$candidate_dir" results/normalized_python_tier1.json <<'PY'
          from __future__ import annotations

          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          baseline_dir = Path(sys.argv[1])
          candidate_dir = Path(sys.argv[2])
          source_results = Path(sys.argv[3])

          baseline_meta: dict[str, str] = {}
          for line in baseline_dir.joinpath("run.yaml").read_text(encoding="utf-8").splitlines():
              if ":" not in line:
                  continue
              key, value = line.split(":", 1)
              key = key.strip()
              if key in {"run_id", "date", "comparable_group"}:
                  baseline_meta[key] = value.strip().strip('"')

          if not baseline_meta.get("run_id") or not baseline_meta.get("comparable_group"):
              raise SystemExit("Baseline run.yaml is missing required comparison metadata")

          raw_dir = candidate_dir / "raw"
          raw_dir.mkdir(parents=True, exist_ok=True)
          raw_dir.joinpath("results.json").write_text(
              source_results.read_text(encoding="utf-8"),
              encoding="utf-8",
          )

          now = datetime.now(timezone.utc).replace(microsecond=0)
          run_id = f"{now.date().isoformat()}_nightly-python-tier1"
          candidate_dir.joinpath("run.yaml").write_text(
              "\n".join(
                  [
                      f'run_id: "{run_id}"',
                      f'date: "{now.isoformat().replace("+00:00", "Z")}"',
                      'label: "nightly-python-tier1"',
                      'role: candidate',
                      f'compares_to: "{baseline_meta["run_id"]}"',
                      f'comparable_group: "{baseline_meta["comparable_group"]}"',
                      '',
                      'artifacts:',
                      '  raw_dir: raw/',
                      '',
                      f'notes: "Generated from results/normalized_python_tier1.json; baseline={baseline_meta["run_id"]}"',
                      '',
                  ]
              ),
              encoding="utf-8",
          )
          PY

          compare_exit_code=0
          python3 scripts/compare_runs.py \
            --baseline-dir "$baseline_dir" \
            --candidate-dir "$candidate_dir" \
            --output results/regression_report.json || compare_exit_code=$?

          if [ "$compare_exit_code" -eq 2 ]; then
            exit 1
          fi

          python3 scripts/pr_comment.py results/regression_report.json > results/regression_comment.md
          printf 'exit_code=%s\n' "$compare_exit_code" >> "$GITHUB_OUTPUT"

      - name: Create issue for nightly regression
        if: steps.compare_regression.outputs.exit_code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list \
            --search "Nightly benchmark regression detected: Python Tier 1 in:title" \
            --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file results/regression_comment.md
          else
            gh issue create \
              --title "Nightly benchmark regression detected: Python Tier 1" \
              --body-file results/regression_comment.md
          fi

      - name: Save results and clean working tree
        run: |
          cp -r results/ /tmp/bench-results/
          git checkout -- results/


      - name: Upload benchforge v2 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchforge-v2-results-${{ github.run_id }}
          path: /tmp/bench-results/benchforge_v2/*.json
          if-no-files-found: error

      - name: Publish benchmark report
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Python Tier1 Benchmark
          tool: pytest
          output-file-path: /tmp/bench-results/python_tier1.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          summary-always: true
