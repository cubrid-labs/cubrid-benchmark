services:
  cubrid:
    image: cubrid/cubrid:11.2
    container_name: cubrid-bench-cubrid
    shm_size: 256m
    environment:
      CUBRID_DB: benchdb
    ports:
      - "33000:33000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/33000'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mysql:
    image: mysql:8.0
    container_name: cubrid-bench-mysql
    environment:
      MYSQL_ROOT_PASSWORD: bench
      MYSQL_DATABASE: benchdb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h127.0.0.1 -uroot -pbench --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
